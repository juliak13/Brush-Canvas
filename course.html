<!DOCTYPE html>
<html>
    <head>
        <title>Course Registration</title>
        <script>
         function updateCourseID() {
             var department = document.getElementById("dept").value;

             if (department === "drawing") {
                 document.getElementById("cid").value = "100";
             } else if (department === "painting") {
                 document.getElementById("cid").value = "200";
             } else if (department === "calligraphy") {
                 document.getElementById("cid").value = "300";
             } else if (department === "photography") {
                 document.getElementById("cid").value = "400";
             } else if (department === "graphic_design") {
                 document.getElementById("cid").value = "500";
             }
         }
     </script>
    </head>
    <body>
        <h2>Course Registration</h2>
        <form method="POST" action="course.php">
            <table>
                <tr>
                   <td>Course Name:</td>
                   <td><input type = "text" name = "cname"></td>
                </tr>
                
                <tr>
                  <td>Credits:</td>
                  <td><input type = "text" name = "credit"></td>
                </tr>

                <tr>
                   <td>Department:</td>
                   <td><input type = "text" name = "dept"></td>
                </tr>
                
                <tr>
                    <td>Instructor:</td>
                    <td><input type = "text" name = "instructor"></td>
                </tr>
    
                <tr>
                   <td>Description:</td>
                   <td><textarea name = "description" rows = "5" cols = "40"></textarea></td>
                </tr>
                <tr>
                    <td>Seats:</td>
                    <td><input type = "text" name = "seats"></td>
                </tr>
                <tr>
                   <td>Modality:</td>
                   <td>
                      <input type = "radio" name = "modality" value = "in-person">In-Person
                      <input type = "radio" name = "modality" value = "online">Online
                   </td>
                </tr>
    
                
                
                <tr>
                   <td>
                      <input type = "submit" name = "submit" value = "Submit"> 
                   </td>
                </tr>
             </table>
        </form>
    </body>
